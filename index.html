<!DOCTYPE html>
<html>
<head>
  <title>iNKPEN AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h2><span class="inkpen">iNKPEN</span> <span class="ai">AI</span></h2>
      <button onclick="addLink()">+ NEW LINK</button>
      <button onclick="generateContent()">GENERATE CONTENT</button>
      <div id="links"></div>
    </div>

    <div id="terminal">
      <div id="output"></div>

      <div id="inputBar">
        <input id="input" placeholder="Enter command..." />
        <button onclick="send()" class="send-btn">✈</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
